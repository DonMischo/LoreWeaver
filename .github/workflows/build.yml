name: Build & Release

# Trigger on version tags (e.g. v1.0.0) or manually via the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: pwsh -File build.ps1
          - os: macos-latest
            build_cmd: bash build.sh
          - os: ubuntu-latest
            build_cmd: bash build.sh

    runs-on: ${{ matrix.os }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── Python 3.11 ─────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── uv (fast Python package installer) ──────────────────────────────────
      - uses: astral-sh/setup-uv@v4

      # ── Install Python dependencies into api/.venv ───────────────────────────
      - name: Install Python dependencies
        run: |
          cd api
          uv sync

      # ── Linux: install required system libraries for Electron ────────────────
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 \
            libxtst6 xdg-utils libatspi2.0-0 libuuid1 libsecret-1-0

      # ── Run the single build script ──────────────────────────────────────────
      - name: Build
        run: ${{ matrix.build_cmd }}
        env:
          # Suppress electron-builder code signing on CI (no certs available).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # Do NOT pass GH_TOKEN here — that would trigger electron-builder's
          # implicit publish and fail without contents:write. The release job
          # below handles uploading artifacts to GitHub Releases instead.

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: LoreWeaver-${{ runner.os }}
          # Collect all installer formats
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.zip
          retention-days: 30

  # ── Create GitHub Release when a tag is pushed ─────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

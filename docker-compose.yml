services:
  languagetool:
    image: meyay/languagetool:latest
    container_name: languagetool
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:exec
    cap_drop:
      - ALL
    cap_add:
      - CAP_CHOWN
      - CAP_DAC_OVERRIDE
      - CAP_SETUID
      - CAP_SETGID
    security_opt:
      - no-new-privileges
    ports:
      - "8081:8081"
    environment:
      # Download n-gram data for better suggestions (optional, large)
      # Remove or comment out if you want a lightweight start
      download_ngrams_for_langs: ${LT_LANGS:-en}
      
      # Java heap size — tune to your system
      JAVA_XMS: 512m
      JAVA_XMX: 2g
      
      # Optional: skip if you don't need the web UI
      # langtool_https_server: "false"
    volumes:
      # N-gram data cache (~2–3 GB per language, downloaded once)
      - ./languagetool/ngrams:/ngrams
      
      # FastText model cache (~150 MB, downloaded once)
      - ./languagetool/fasttext:/fasttext
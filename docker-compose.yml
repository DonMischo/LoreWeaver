services:

  # ── QEMU binfmt registration ─────────────────────────────────────────────────
  # meyay/languagetool is x86_64-only. On ARM hosts (Windows on ARM, Apple
  # Silicon) Docker runs it via QEMU emulation, but the binfmt handlers must be
  # registered first. This one-shot container does that automatically so users
  # never have to run a manual "docker run --privileged tonistiigi/binfmt" step.
  # On native amd64 hosts the registration is a harmless no-op.
  binfmt:
    image: tonistiigi/binfmt:latest
    container_name: foliantica-binfmt
    privileged: true
    restart: "no"
    command: --install amd64

  languagetool:
    image: meyay/languagetool:latest
    # meyay's image is x86_64-only. linux/amd64 runs natively on amd64 hosts
    # and under QEMU emulation on arm64 (Windows on ARM, Apple Silicon).
    platform: linux/amd64
    container_name: foliantica-languagetool
    restart: unless-stopped
    depends_on:
      binfmt:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:exec
    cap_drop:
      - ALL
    cap_add:
      - CAP_CHOWN
      - CAP_DAC_OVERRIDE
      - CAP_SETUID
      - CAP_SETGID
    security_opt:
      - no-new-privileges
    ports:
      # Bind to localhost only — LanguageTool is a local service, no need to
      # expose it to other devices on the network.
      - "127.0.0.1:8081:8081"
    environment:
      # N-gram models improve confused-word and style detection (~2–3 GB per
      # language, downloaded once on first start — container will be slow to
      # respond until the download finishes).
      download_ngrams_for_langs: ${LT_LANGS:-en}

      # Restrict API access to localhost and the Docker bridge subnet.
      # Suppresses the "running in public mode" startup warning and prevents
      # access from other network devices.
      # 127.0.0.1       — host loopback (direct connections)
      # 172.16.0.0/12   — Docker bridge networks (172.17–172.31.x.x)
      langtool_allowedIps: 127.0.0.1;172.16.0.0/12

      # Java heap size — tune to your system
      JAVA_XMS: 512m
      JAVA_XMX: 2g
    volumes:
      # Named volumes — stored in Docker's own volume store, completely outside
      # the app installation directory. Survive reinstalls and app updates.
      - foliantica-lt-ngrams:/ngrams
      - foliantica-lt-fasttext:/fasttext

  pandoc:
    build:
      context: ./docker/pandoc
    container_name: foliantica-pandoc
    restart: unless-stopped
    ports:
      - "8082:8082"

# ── Named volumes ─────────────────────────────────────────────────────────────
# Stored in Docker's volume store (outside the app installation directory).
# Persist across Foliantica reinstalls, updates, and OS reboots.
# To reclaim disk space: docker volume rm foliantica-lt-ngrams foliantica-lt-fasttext
volumes:
  foliantica-lt-ngrams:
  foliantica-lt-fasttext:
